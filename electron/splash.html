<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:;" />
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0f1115;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none; user-select: none;
      }
      .wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      .mark { width: 72px; height: 72px; }
      .word { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      .sub { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #8a90a0; margin-top: -14px; }
      .bar { width: 132px; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
      .bar > span {
        display: block; height: 100%; width: 40%; border-radius: 3px;
        background: #2f6fd6;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-120%); } 100% { transform: translateX(360%); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="11" fill="#2f6fd6" />
        <rect x="11" y="12.5" width="18" height="3.4" rx="1.7" fill="#fff" />
        <rect x="11" y="18.3" width="18" height="3.4" rx="1.7" fill="#fff" fill-opacity="0.85" />
        <rect x="11" y="24.1" width="11" height="3.4" rx="1.7" fill="#fff" fill-opacity="0.6" />
      </svg>
      <div style="text-align:center">
        <div class="word">Tenant Manager</div>
        <div class="sub">Property Suite</div>
      </div>
      <div class="bar"><span></span></div>
    </div>
  </body>
</html>
